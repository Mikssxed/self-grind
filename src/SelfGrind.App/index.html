<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>SelfGrind | Gamified Task Manager — Turn Tasks into XP</title>
    <meta
      name="description"
      content="SelfGrind is a free gamified task manager and habit tracker. Complete daily quests, earn XP, grow your stats, and level up your character."
    />
    <meta name="theme-color" content="#8b5cf6" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / LinkedIn / Facebook.
         NOTE: replace https://selfgrind.example.com with your deployed URL so the link preview
         (og:image, og:url, canonical) resolves to an absolute address. -->
    <link rel="canonical" href="https://selfgrind.example.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SelfGrind" />
    <meta property="og:title" content="SelfGrind — Turn your tasks into XP" />
    <meta
      property="og:description"
      content="A gamified task manager — complete quests and habits to earn XP and level up your character."
    />
    <meta property="og:url" content="https://selfgrind.example.com/" />
    <meta property="og:image" content="https://selfgrind.example.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SelfGrind — Turn your tasks into XP" />
    <meta
      name="twitter:description"
      content="A gamified task manager — complete quests and habits to earn XP and level up your character."
    />
    <meta name="twitter:image" content="https://selfgrind.example.com/og-image.png" />

    <!-- Structured data for rich results. The FAQPage entries must stay in sync with the visible
         FAQ section on the landing page (src/components/landing/LandingFaq.vue). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SelfGrind",
        "url": "https://selfgrind.example.com/",
        "applicationCategory": "Productivity",
        "operatingSystem": "Web",
        "description": "A free gamified task manager and habit tracker. Complete daily quests, earn XP, grow your stats, and level up your character.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is SelfGrind?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "SelfGrind is a free gamified task manager and habit tracker. Every task you complete grants XP that levels up your character and grows attributes like Strength and Knowledge."
            }
          },
          {
            "@type": "Question",
            "name": "Is SelfGrind free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. SelfGrind is completely free — create an account and start earning XP in minutes. No credit card required."
            }
          },
          {
            "@type": "Question",
            "name": "How does the XP and leveling system work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Each task and habit is worth XP and is tied to an attribute. Completing it raises both your overall level and that attribute, so your character mirrors your real-life effort."
            }
          },
          {
            "@type": "Question",
            "name": "Can I track habits as well as tasks?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Daily and recurring habits get a GitHub-style contribution grid, so you can see your streaks and consistency at a glance."
            }
          },
          {
            "@type": "Question",
            "name": "How is SelfGrind different from a normal to-do app?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Instead of a plain checklist, SelfGrind gives you the feedback loops of a game: XP, levels, stats, achievements, and a leaderboard that make finishing things genuinely satisfying."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
